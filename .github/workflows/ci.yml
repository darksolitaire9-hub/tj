name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Lint
        run: npm run lint
        
      - name: Build
        run: npm run build
        
      - name: Run Vitest
        run: npm run test -- --run
        
      - name: Run Bineval Golden Tests
        run: |
          chmod +x tools/bineval.exe || true
          # Note: bineval.exe is a windows binary, assuming we will cross-compile or run via wine in real CI, 
          # or we'll replace with linux binary. For now, this serves as the template.
          ./tools/bineval.exe audit --suite tests/tj_eval.yaml
