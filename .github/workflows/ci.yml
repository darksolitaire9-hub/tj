name: CI
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build
        run: npm run build
        
      - name: Run Bineval Golden Tests
        run: |
          # Generate outputs
          npm run test:tj_engine
          
          # Run strict assertion evaluation
          .\tools\bineval.exe run --suite tj_eval_anomalous -p . -t tests\evals\high
          .\tools\bineval.exe run --suite tj_eval_clean -p . -t tests\evals\clean
